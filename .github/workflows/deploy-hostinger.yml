name: Deploy to Hostinger

# Push to main -> build the Node server on GitHub's runner (16 GB RAM, so the
# heavy `vite build` runs fine here, NOT on the shared host) -> rsync the
# self-contained `.output/` to Hostinger over SSH -> restart the Passenger app.
#
# Build-time secrets (VITE_*) are baked into the client bundle here.
# Runtime secrets (SUPABASE_SERVICE_ROLE_KEY, DATABASE_URL, etc.) are set in the
# Hostinger Node.js app's Environment Variables, NOT here.

on:
  push:
    branches: [main]
  workflow_dispatch: {}

concurrency:
  group: hostinger-deploy
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node 22
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build Node server output (.output/)
        env:
          NODE_OPTIONS: --max-old-space-size=8192
          VITE_SUPABASE_PROJECT_ID: ${{ secrets.VITE_SUPABASE_PROJECT_ID }}
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_PUBLISHABLE_KEY: ${{ secrets.VITE_SUPABASE_PUBLISHABLE_KEY }}
        run: npm run build:node

      - name: Verify build artifact exists
        run: test -f .output/server/index.mjs || (echo "::error::.output/server/index.mjs missing — build failed" && exit 1)

      - name: Configure SSH
        run: |
          mkdir -p ~/.ssh
          printf '%s\n' "${{ secrets.HOSTINGER_SSH_KEY }}" > ~/.ssh/id_deploy
          chmod 600 ~/.ssh/id_deploy
          ssh-keyscan -p "${{ secrets.HOSTINGER_SSH_PORT }}" "${{ secrets.HOSTINGER_SSH_HOST }}" >> ~/.ssh/known_hosts 2>/dev/null

      - name: Deploy .output/ via rsync
        run: |
          rsync -az --delete \
            -e "ssh -i ~/.ssh/id_deploy -p ${{ secrets.HOSTINGER_SSH_PORT }}" \
            .output/ \
            "${{ secrets.HOSTINGER_SSH_USER }}@${{ secrets.HOSTINGER_SSH_HOST }}:${{ secrets.HOSTINGER_APP_PATH }}/.output/"

      - name: Restart Node.js app (Passenger)
        run: |
          ssh -i ~/.ssh/id_deploy -p "${{ secrets.HOSTINGER_SSH_PORT }}" \
            "${{ secrets.HOSTINGER_SSH_USER }}@${{ secrets.HOSTINGER_SSH_HOST }}" \
            "mkdir -p '${{ secrets.HOSTINGER_APP_PATH }}/tmp' && touch '${{ secrets.HOSTINGER_APP_PATH }}/tmp/restart.txt'"
